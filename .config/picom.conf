shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-exclude = [ 
  "name = 'Notification'", 
  "class_g = 'Conky'", 
  "class_g ?= 'Notify-osd'", 
  "class_g = 'Cairo-clock'", 
  "_GTK_FRAME_EXTENTS@:c",
];
fading = true;
fade-in-step = 0.07;
fade-out-step = 0.07;
inactive-opacity = 0.8;
frame-opacity = 0.7;
inactive-opacity-override = false;
focus-exclude = [ "class_g = 'Cairo-clock'" ];
corner-radius = 0;
rounded-corners-exclude = [ "window_type = 'dock'", "window_type = 'desktop'" ];
blur-kern = "3x3box";
blur-background-exclude = [ 
  # "window_type = 'dock'", 
  "window_type = 'desktop'", 
  "_GTK_FRAME_EXTENTS@:c",
  # ignore android studio emulator
  "class_g = 'AndroidStudio'"

];
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;
detect-transient = true;
use-damage = true;
log-level = "warn";
wintypes : 
{
  tooltip : 
  {
    fade = true;
    shadow = true;
    opacity = 0.75;
    focus = true;
    full-shadow = false;
  };
  dock : 
  {
    shadow = false;
    clip-shadow-above = true;
  };
  dnd : 
  {
    shadow = false;
  };
  popup_menu : 
  {
    opacity = 0.8;
  };
  dropdown_menu : 
  {
    opacity = 0.8;
  };
};
inactive-dim-fixed = false;
blur-background = true;
fade-delta = 15;
blur-background-fixed = true;
xinerama-shadow-crop = true;
active-opacity = 1.0;
blur-background-frame = false;
blur-method = "dual_kawase";
blur-strength = 7;

opacity-rule = [
  "80:class_g = 'Rofi'",
  "80:class_g = 'kitty' && focused",
  "70:class_g = 'kitty' && !focused",
  # android studio emulator
  "100:class_g = 'AndroidStudio'",
];